name: Deploy Wtonec site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - app.js
      - assets/**
      - .nojekyll
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static artifact
        shell: bash
        run: |
          mkdir -p _site/assets
          cp index.html styles.css app.js .nojekyll _site/
          cp -R assets/. _site/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
